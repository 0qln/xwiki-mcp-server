version: '3.8'

services:
  mcp-xwiki:
    build: .
    container_name: mcp-xwiki
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MCP_MODE=http
      - XWIKI_URL=${XWIKI_URL:-}
      - XWIKI_USERNAME=${XWIKI_USERNAME:-}
      - XWIKI_PASSWORD=${XWIKI_PASSWORD:-}
      - XWIKI_WIKI=${XWIKI_WIKI:-xwiki}
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-0}
    restart: unless-stopped

